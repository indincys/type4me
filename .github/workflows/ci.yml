name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Swift Tests
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run full test suite
        run: swift test

      - name: Build cloud DMG artifact
        run: |
          APP_VERSION="ci-${GITHUB_SHA::7}" \
          DMG_NAME="Type4Me-ci-${GITHUB_SHA::7}-cloud.dmg" \
          bash scripts/build-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: type4me-cloud-dmg
          path: dist/Type4Me-ci-*-cloud.dmg
          if-no-files-found: error
          retention-days: 14
